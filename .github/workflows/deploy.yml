# This file is part of the Ebili Online System project.
# GitHub Actions workflow for deploying to GoDaddy via FTP

name: 🚀 Deploy to GoDaddy

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set deployment version file
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "${GITHUB_REF#refs/tags/}" > DEPLOY_VERSION.txt
          else
            echo "${GITHUB_REF#refs/heads/}-$(git rev-parse --short HEAD)" > DEPLOY_VERSION.txt
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./                # root of your project
          server-dir: /                # destination on server
          exclude: |
            **/node_modules/**
            **/tests/**
            **/.git/**
            **/.github/**
            **/.fleet/**
            **/.idea/**
            **/.vscode/**
            .env
            package.json
            package-lock.json
            deploy.php
            public/build
            public/hot
            storage/*.key
            vendor/**
            public/storage/uploads/**   # 🔹 exclude user uploads
            include: |
            resources/views/**/*.blade.php
            public/storage/uploads/**   # 🔹 include only new/changed uploads if needed
            force: true
            security: loose
